name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, build, unit, and integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false
      - run: nix develop .#ci -c pnpm install --frozen-lockfile
      # Temporary WebKit startup diagnostic. Keep the normal integration suite below
      # authoritative; this captures Linux/WebKit process failures separately.
      - name: Diagnose WebKit startup
        continue-on-error: true
        run: |
          nix develop .#ci -c env \
            DEBUG=pw:browser* \
            pnpm --filter typst-wasm exec node --input-type=module -e '
              import { webkit } from "playwright";
              const browser = await webkit.launch();
              const page = await browser.newPage();
              await page.goto("data:text/html,ok");
              console.log(await page.textContent("body"));
              await browser.close();
            '

      - run: nix develop .#ci -c pnpm turbo run build lint test:unit test:integration
