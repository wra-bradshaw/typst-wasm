name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_ARTIFACT_DIR: .ci-artifacts

jobs:
  build:
    name: Lint, build, and unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false
      - run: nix develop .#ci -c pnpm install --frozen-lockfile
      - run: nix develop .#ci -c pnpm turbo run lint build test:unit

  integration-matrix:
    name: Read integration scripts
    runs-on: ubuntu-latest
    outputs:
      cells: ${{ steps.cells.outputs.cells }}
    steps:
      - uses: actions/checkout@v4
      - id: cells
        name: Derive cells from package scripts
        run: |
          cells=$(jq -c '[.scripts | keys[] | select(test("^test:integration:(bun|node|workerd|deno|browser)$")) | sub("^test:integration:"; "") | {name: ., artifact: gsub(":"; "-")}]' packages/typst-wasm/package.json)
          test "$cells" != "[]" || { echo "no integration scripts found"; exit 1; }
          echo "cells=$cells" >> "$GITHUB_OUTPUT"

  integration:
    name: Integration (${{ matrix.cell.name }})
    needs: [build, integration-matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cell: ${{ fromJSON(needs.integration-matrix.outputs.cells) }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false
      - run: nix develop .#ci -c pnpm install --frozen-lockfile
      - run: nix develop .#ci -c pnpm turbo run build --filter=typst-wasm...
      - name: Install browser engines
        if: matrix.cell.name == 'browser'
        run: |
          nix develop .#ci -c pnpm --filter typst-wasm exec playwright install --with-deps chromium firefox webkit
      - name: Run declared integration cell
        env:
          INTEGRATION_RESULTS_DIR: ${{ env.CI_ARTIFACT_DIR }}/${{ matrix.cell.name }}
        run: |
          set -o pipefail
          mkdir -p "$INTEGRATION_RESULTS_DIR"
          nix develop .#ci -c pnpm --filter typst-wasm run "test:integration:${{ matrix.cell.name }}" 2>&1 | tee "$INTEGRATION_RESULTS_DIR/console.log"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-${{ matrix.cell.artifact }}
          path: ${{ env.CI_ARTIFACT_DIR }}/${{ matrix.cell.name }}/
          if-no-files-found: ignore
