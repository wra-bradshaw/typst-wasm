name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, lint, typecheck, format, and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: sandbox = relaxed
      - uses: DeterminateSystems/flakehub-cache-action@v3
        with:
          use-gha-cache: true
      - run: nix develop .#ci -c pnpm install --frozen-lockfile
      - name: Install Playwright browsers and dependencies
        working-directory: packages/typst-wasm
        run: ./node_modules/.bin/playwright install --with-deps chromium firefox webkit
      - run: nix develop .#ci -c pnpm check
