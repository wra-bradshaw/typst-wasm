name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, build, unit, and integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false
      - run: nix develop .#ci -c pnpm install --frozen-lockfile
      - name: Install browser engines
        run: |
          nix develop .#ci -c pnpm --filter typst-wasm exec playwright install --with-deps chromium firefox webkit
      - run: nix develop .#ci -c pnpm turbo run build lint test:unit test:integration
