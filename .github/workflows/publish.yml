name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm packages
    runs-on: ubuntu-latest
    environment: npm

    defaults:
      run:
        shell: nix develop "$GITHUB_WORKSPACE#ci" --command bash -euo pipefail {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false

      - name: Build release artifacts
        run: |
          rm -rf .nix-release
          mkdir -p .nix-release
          nix build .#publish-fonts --out-link .nix-release/fonts
          nix build .#publish-engine-wasm --out-link .nix-release/engine-wasm
          nix build .#publish-typst-wasm --out-link .nix-release/typst-wasm

      - name: Publish @typst-wasm/fonts
        working-directory: .nix-release/fonts
        run: npm publish --access public --provenance

      - name: Publish @typst-wasm/engine-wasm
        working-directory: .nix-release/engine-wasm
        run: npm publish --access public --provenance

      - name: Publish typst-wasm
        working-directory: .nix-release/typst-wasm
        run: npm publish --access public --provenance
