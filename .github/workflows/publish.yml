name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.package.out }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - out: fonts
            attr: publish-fonts
          - out: engine-wasm
            attr: publish-engine-wasm
          - out: typst-wasm
            attr: publish-typst-wasm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false

      - name: Build release artifact
        run: |
          set -euo pipefail

          out_path="$(nix build ".#${{ matrix.package.attr }}" --no-link --print-out-paths)"

          mkdir -p "artifact/${{ matrix.package.out }}"
          cp -R "$out_path"/. "artifact/${{ matrix.package.out }}/"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.package.out }}
          path: artifact/${{ matrix.package.out }}
          if-no-files-found: error

  publish:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs: build
    environment: npm

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: .nix-release

      - name: Publish npm packages
        run: |
          set -euo pipefail

          publish_package() {
            package_dir="$1"

            version="$(node -p "require('./${package_dir}/package.json').version")"

            tag="latest"
            if [[ "$version" == *-* ]]; then
              tag="next"
            fi

            echo "Publishing ${package_dir} with npm tag '${tag}'"

            npm publish "$package_dir" \
              --access public \
              --provenance \
              --tag "$tag"
          }

          # Publish in dependency order.
          publish_package ".nix-release/package-fonts"
          publish_package ".nix-release/package-engine-wasm"
          publish_package ".nix-release/package-typst-wasm"
