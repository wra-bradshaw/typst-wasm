name: Deploy examples

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-examples-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-examples:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Deploy examples
    runs-on: ubuntu-latest
    environment: examples

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: sandbox = relaxed

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false

      - name: Install dependencies
        run: nix develop .#ci -c pnpm install --frozen-lockfile

      - name: Build Vercel artifact
        run: nix run .#build-artifact -- example-typst-playground-vercel .vercel/output

      - name: Deploy playground to Vercel
        run: nix develop .#ci -c pnpm exec vercel --cwd packages/example-typst-playground-vercel deploy --prebuilt --prod --yes --archive=tgz --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PLAYGROUND }}

      - name: Build playground Cloudflare artifact
        run: nix run ../..#build-artifact -- example-typst-playground-cloudflare dist
        working-directory: packages/example-typst-playground-cloudflare

      - name: Build Vite React Cloudflare artifact
        run: nix run .#build-artifact -- example-vite-react-cloudflare dist

      - name: Deploy Vite React example to Cloudflare Workers
        run: nix develop .#ci -c pnpm --dir packages/example-vite-react-cloudflare exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy playground to Cloudflare Workers
        run: nix develop .#ci -c pnpm --dir packages/example-typst-playground-cloudflare exec wrangler deploy --config dist/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build blog static artifact
        run: nix run ../..#build-artifact -- example-typst-blog dist
        working-directory: packages/example-typst-blog

      - name: Deploy blog to Cloudflare Workers
        run: nix develop .#ci -c pnpm --dir packages/example-typst-blog exec wrangler deploy --config dist/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
