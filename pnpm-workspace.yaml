packages:
  - packages/*
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - "@bytecodealliance/jco"
  - "@bytecodealliance/jco-transpile"
  - "@bytecodealliance/componentize-js"
trustPolicy: no-downgrade
trustPolicyExclude:
  - "oxc-parser"
  - "@oxc-parser/*"
blockExoticSubdeps: true
strictDepBuilds: true
allowBuilds:
  esbuild: true
  sharp: true
  workerd: true
overrides:
  semver: ^7.8.5
